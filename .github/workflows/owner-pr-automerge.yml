name: Owner PR Auto-Merge

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Enable auto-merge for eligible owner PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/github/enable-owner-pr-automerge.js
