name: Owner PR Auto-Merge

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for eligible owner PRs
        uses: actions/github-script@v7
        with:
          script: |
            const repositoryFullName = `${context.repo.owner}/${context.repo.repo}`;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const isUnstableStatusError = (message) => /pull request is in unstable status/i.test(message);

            const isEligiblePr = (pr) => {
              if (!pr) {
                core.info('Skipping because pull request payload is missing.');
                return false;
              }

              if (pr.base?.ref !== 'main') {
                core.info(`Skipping PR #${pr.number}: base branch is ${pr.base?.ref}, expected main.`);
                return false;
              }

              if (pr.draft) {
                core.info(`Skipping PR #${pr.number}: draft PRs are not eligible.`);
                return false;
              }

              if (pr.user?.login !== context.repo.owner) {
                core.info(
                  `Skipping PR #${pr.number}: author ${pr.user?.login ?? 'unknown'} is not repository owner ${context.repo.owner}.`
                );
                return false;
              }

              const isSameRepository =
                pr.head?.repo?.full_name === repositoryFullName &&
                pr.head?.repo?.fork !== true;

              if (!isSameRepository) {
                core.info(
                  `Skipping PR #${pr.number}: head repository must be ${repositoryFullName} and must not be a fork.`
                );
                return false;
              }

              if (typeof pr.node_id !== 'string' || pr.node_id.length === 0) {
                core.warning(`Skipping PR #${pr.number}: missing pull request node id.`);
                return false;
              }

              return true;
            };

            const tryEnableAutoMerge = async (pr) => {
              const maxAttempts = 6;
              const retryDelayMs = 10000;

              for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
                try {
                  await github.graphql(
                    `
                      mutation EnableAutoMerge($pullRequestId: ID!) {
                        enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId }) {
                          pullRequest {
                            number
                          }
                        }
                      }
                    `,
                    { pullRequestId: pr.node_id }
                  );

                  core.info(`Enabled auto-merge for PR #${pr.number}.`);
                  return;
                } catch (error) {
                  const message = error instanceof Error ? error.message : String(error);

                  if (/already (has )?auto-merge enabled/i.test(message)) {
                    core.info(`Auto-merge already enabled for PR #${pr.number}.`);
                    return;
                  }

                  const isLastAttempt = attempt === maxAttempts;
                  if (isUnstableStatusError(message) && !isLastAttempt) {
                    core.info(
                      `PR #${pr.number} is in unstable status (attempt ${attempt}/${maxAttempts}). Retrying in ${retryDelayMs / 1000}s.`
                    );
                    await sleep(retryDelayMs);
                    continue;
                  }

                  if (isUnstableStatusError(message) && isLastAttempt) {
                    core.warning(
                      `PR #${pr.number} remained in unstable status after ${maxAttempts} attempts. Will retry on the next scheduled run.`
                    );
                    return;
                  }

                  throw error;
                }
              }
            };

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              if (isEligiblePr(pr)) {
                await tryEnableAutoMerge(pr);
              }
              return;
            }

            if (context.eventName === 'schedule') {
              const { data: pullRequests } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                base: 'main',
                per_page: 100,
              });

              for (const pr of pullRequests) {
                if (isEligiblePr(pr)) {
                  await tryEnableAutoMerge(pr);
                }
              }
              return;
            }

            core.info(`Event ${context.eventName} is not handled by this workflow.`);
